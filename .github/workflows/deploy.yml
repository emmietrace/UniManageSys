name: Build and Deploy to MonsterASP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Adjusted for your net10.0 project

      - name: 🛠️ Restore dependencies
        run: dotnet restore UniManageSys/UniManageSys.csproj

      - name: 🏗️ Build and Publish
        run: dotnet publish UniManageSys/UniManageSys.csproj -c Release -o ./publish

      - name: 🚀 Upload to MonsterASP via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
